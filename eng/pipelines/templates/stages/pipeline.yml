parameters:
- name: isProdPipeline
  displayName: Indicates whether this template should be configured for a production or non-production pipeline.
  type: boolean
- name: deployPCS
  type: boolean
  default: true
- name: deployBI
  type: boolean
  default: true
- name: skipMigrationsPCS
  type: boolean
  default: false
- name: skipMigrationsBI
  type: boolean
  default: false

stages:
- stage: Build
  dependsOn: []
  displayName: Build
  jobs:
  - template: /eng/common/templates-official/jobs/jobs.yml@self
    parameters:
      artifacts:
        publish:
          logs: true
          ${{ if parameters.isProdPipeline }}:
            manifests: true
      enableTelemetry: true
      enableMicrobuild: false
      enablePublishTestResults: false
      enablePublishUsingPipelines: ${{ variables._PublishUsingPipelines }}
      jobs:
      - job: Windows_NT
        timeoutInMinutes: 90
        displayName: Build repository
        pool:
          name: $(DncEngInternalBuildPool)
          image: 1es-windows-2022
          os: windows
        variables:
        - group: DotNet-Symbol-Server-Pats
        - group: Publish-Build-Assets
        - _InternalBuildArgs: >
            /p:DotNetSignType=$(_SignType)
            /p:TeamName=$(_TeamName)
            /p:DotNetPublishUsingPipelines=$(_PublishUsingPipelines)
            /p:DotNetArtifactsCategory=$(_DotNetArtifactsCategory)
            /p:DotNetSymbolServerTokenMsdl=$(microsoft-symbol-server-pat)
            /p:DotNetSymbolServerTokenSymWeb=$(symweb-symbol-server-pat)
            /p:OfficialBuildId=$(BUILD.BUILDNUMBER)
        - _BuildConfig: Release
        - _PublishType: blob
        - _SignType: test
        steps:
        - checkout: self
          clean: true
        - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/production')}}:
          - template: /eng/common/templates-official/steps/retain-build.yml@self
            parameters:
              AzdoOrgUri: $(AzdoOrgUri)
              AzdoProject: $(AzdoProject)
              BuildId: $(Build.BuildId)
        - template: /eng/pipelines/templates/steps/build.yml@self
          parameters:
            configuration: $(_BuildConfig)
            buildArgs: $(_InternalBuildArgs)
        templateContext:
          outputs:
          - output: pipelineArtifact
            path: $(Build.SourcesDirectory)\artifacts\bin\ProductConstructionService.ScenarioTests\$(_BuildConfig)\net10.0\publish
            artifact: ProductConstructionService.ScenarioTests
            displayName: Publish E2E Tests
          - output: pipelineArtifact
            path: $(Build.SourcesDirectory)\artifacts\bin\ProductConstructionService.Cli\$(_BuildConfig)\net10.0
            artifact: ProductConstructionService.Cli
            displayName: Publish PCS CLI
          - output: pipelineArtifact
            path: $(Build.SourcesDirectory)\artifacts\bin\BuildInsightsCli\$(_BuildConfig)\net10.0
            artifact: BuildInsightsCli
            displayName: Publish BuildInsights CLI

      - job: BuildAndPublishDocker
        displayName: Build/publish docker images
        pool:
          name: NetCore1ESPool-Internal
          demands: ImageOverride -equals build.azurelinux.3.amd64
          os: linux
        steps:

        - checkout: self

        - template: /eng/pipelines/templates/steps/docker-build.yml@self
          parameters:
            devBranchSuffix: $(devBranchSuffix)
            pcsDockerImageName: $(dockerRegistryUrl)/$(containerName)
            biDockerImageName: $(buildInsightsDockerRegistryUrl)/$(buildInsightsImageName)

        - ${{ if notin(variables['Build.Reason'], 'PullRequest') }}:

          - task: AzureCLI@2
            inputs:
              azureSubscription: $(pcsDeploymentServiceConnection)
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(containerRegistryName)
                docker push "$(dockerRegistryUrl)/$(containerName):$(DockerTag.newDockerImageTag)"
            displayName: Push PCS docker image

          - task: AzureCLI@2
            condition: and(succeeded(), eq(variables['buildInsightsPushImage'], 'true'))
            inputs:
              azureSubscription: $(buildInsightsDeploymentServiceConnection)
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(buildInsightsContainerRegistryName)
                docker push "$(buildInsightsDockerRegistryUrl)/$(buildInsightsImageName):$(DockerTag.newDockerImageTag)"
            displayName: Push BuildInsights docker image

- ${{ if eq(parameters.deployPCS, true) }}:
  - template: /eng/pipelines/templates/stages/deploy-pcs.yaml@self
    parameters:
      skipMigrations: ${{ parameters.skipMigrationsPCS }}

# Do this for the non production pipeline yet
- ${{ if and(eq(parameters.deployBI, true), ne(variables['Build.SourceBranch'], 'refs/heads/production')) }}:
  - template: /eng/pipelines/templates/stages/deploy-build-insights.yaml@self
    parameters:
      skipMigrations: ${{ parameters.skipMigrationsBI }}
